<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spam Detector Login</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#0ea5e9);
}

.login-box{
background:white;
width:420px;
padding:45px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
text-align:center;
}

h1{
margin-bottom:10px;
color:#312e81;
}

p{
color:#666;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
margin:12px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#3730a3;
}

.logo{
font-size:50px;
margin-bottom:15px;
}

</style>

</head>
<body>

<div class="login-box">

<div class="logo">
🛡️
</div>

<h1>Email Spam Detector</h1>

<p>Secure Login Portal</p>

<form action="login" method="post">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

</div>

</body>
</html>
